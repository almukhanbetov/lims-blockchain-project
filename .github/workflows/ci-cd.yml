name: CI/CD — Build, Push & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── Job 1: Проверка Go кода ─────────────────────────────────────────────────
  test-adapter:
    name: Test Adapter (Go)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: adapter/go.mod

      - name: Download dependencies
        working-directory: adapter
        run: go mod tidy

      - name: Build check
        working-directory: adapter
        run: go build ./...

      - name: Test
        working-directory: adapter
        run: go test ./...

  # ── Job 2: Сборка и публикация образов на Docker Hub ───────────────────────
  build-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: test-adapter
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push — blockchain
        uses: docker/build-push-action@v5
        with:
          context: ./blockchain
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/lims-blockchain-node:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/lims-blockchain-node:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push — adapter
        uses: docker/build-push-action@v5
        with:
          context: ./adapter
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/lims-adapter:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/lims-adapter:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push — ui
        uses: docker/build-push-action@v5
        with:
          context: ./ui
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/lims-blockchain-ui:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/lims-blockchain-ui:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 3: Деплой на VPS ───────────────────────────────────────────────────
  deploy:
    name: Deploy to VPS (109.235.117.99)
    runs-on: ubuntu-latest
    needs: build-push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy deploy files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "deploy/docker-compose.yml"
          target: "/opt/lims-blockchain"
          strip_components: 1

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            cd /opt/lims-blockchain

            # Записать актуальный образ
            export DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            export IMAGE_TAG=${{ github.sha }}

            # Подтянуть новые образы
            docker compose -f docker-compose.yml pull adapter ui blockchain

            # Перезапустить контейнеры без остановки senaite
            docker compose -f docker-compose.yml up -d --no-deps adapter ui blockchain

            # Удалить старые образы
            docker image prune -f

            echo "Deployed ${{ github.sha }} at $(date)"

      - name: Health check
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            sleep 5
            curl -sf -X POST http://localhost:8545 \
              -H "Content-Type: application/json" \
              -d '{"jsonrpc":"2.0","method":"eth_chainId","params":[],"id":1}' \
              | grep -q "result" \
              && echo "Blockchain OK" \
              || (echo "Blockchain FAILED" && exit 1)

            curl -sf http://localhost:8090/ | grep "LIMS Blockchain Adapter" \
              && echo "Adapter OK" \
              || (echo "Adapter FAILED" && exit 1)

      - name: Summary
        run: |
          echo "### Deployed to VPS" >> $GITHUB_STEP_SUMMARY
          echo "- Host: \`109.235.117.99\`" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- UI: http://109.235.117.99:3000" >> $GITHUB_STEP_SUMMARY
          echo "- Adapter: http://@109.235.117.99:8090" >> $GITHUB_STEP_SUMMARY
          echo "- LIMS: http://109.235.117.99:8080" >> $GITHUB_STEP_SUMMARY
          echo "- Blockchain RPC: http://109.235.117.99:8545" >> $GITHUB_STEP_SUMMARY
